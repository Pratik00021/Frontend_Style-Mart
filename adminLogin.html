```html
<!DOCTYPE html>
<html>
<head>
<title>Admin Login - StyleMart</title>

<style>

body{
margin:0;
font-family:'Segoe UI';
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#111827,#4f46e5);
}

/* CARD */

.login-box{
background:#f9fafb;
padding:40px;
border-radius:14px;
width:350px;
box-shadow:0 20px 50px rgba(0,0,0,0.4);
animation:fadeIn 0.6s ease;
}

/* TITLE */

.login-box h2{
text-align:center;
color:#ef4444;
margin-bottom:25px;
}

/* INPUT */

.input-group{
margin-bottom:20px;
}

.input-group label{
display:block;
margin-bottom:6px;
color:#374151;
}

.input-group input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
outline:none;
transition:0.3s;
}

.input-group input:focus{
border-color:#6366f1;
box-shadow:0 0 0 2px rgba(99,102,241,0.2);
}

/* BUTTON */

.login-btn{
width:100%;
padding:14px;
border:none;
border-radius:30px;
background:#ef4444;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.login-btn:hover{
background:#dc2626;
transform:scale(1.03);
}

/* ANIMATION */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<div class="input-group">
<label>Admin Email</label>
<input type="email" id="email">
</div>

<div class="input-group">
<label>Admin Password</label>
<input type="password" id="password">
</div>

<button class="login-btn" onclick="loginAdmin()">
Login as Admin
</button>

</div>

<script>

/* LOGIN FUNCTION */

async function loginAdmin(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

if(!email || !password){
alert("Enter email and password");
return;
}

/* CALL BACKEND */

const res = await fetch("https://backend-style-mart.vercel.app/admin/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email,
password
})
});

const data = await res.json();

if(data.success){

localStorage.setItem("role","admin");

/* REDIRECT TO DASHBOARD */
window.location="admin.html";

}else{
alert("Invalid Admin Credentials");
}

}

</script>

</body>
</html>
```
