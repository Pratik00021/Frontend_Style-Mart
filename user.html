<!DOCTYPE html>
<html>
<head>

<title>User Dashboard</title>

<style>

body{

margin:0;
font-family:Segoe UI;
display:flex;
background:#f4f6f9;

}

/* SIDEBAR */

.sidebar{

width:230px;
background:#2563eb;
color:white;
height:100vh;
padding:20px;

}

.menu{

padding:12px;
margin-bottom:10px;
background:rgba(255,255,255,.2);
cursor:pointer;
border-radius:8px;

}

/* MAIN */

.main{

flex:1;
padding:25px;

}

.card{

background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;

}

table{

width:100%;
border-collapse:collapse;

}

th,td{

padding:10px;
border-bottom:1px solid #ddd;

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>User Panel</h2>

<div class="menu" onclick="loadProfile()">Profile</div>

<div class="menu" onclick="loadCart()">My Cart</div>

<div class="menu" onclick="loadOrders()">My Orders</div>

<div class="menu" onclick="logout()">Logout</div>

</div>


<!-- MAIN -->

<div class="main">

<h1 id="welcome"></h1>

<div id="content"></div>

</div>


<script>

/* SECURITY */

if(localStorage.getItem("role")==="admin"){

location="admin.html";

}

const email=localStorage.getItem("loggedInUser");

if(!email){

alert("Login First");

location="index.html";

}

document.getElementById("welcome").innerText=

"Welcome "+email.split("@")[0].toUpperCase();


/* PROFILE */

function loadProfile(){

content.innerHTML=`

<div class="card">

<h2>Profile</h2>

<p>Email : ${email}</p>

</div>

`;

}

loadProfile();



/* CART */

async function loadCart(){

const cart=await fetch(

"https://backend-style-mart.vercel.app/cart/"+email

).then(r=>r.json());

let html="<div class='card'><h2>My Cart</h2>";

html+="<table>";

html+="<tr><th>Product</th><th>Price</th></tr>";

cart.forEach(c=>{

html+=`

<tr>

<td>${c.name}</td>

<td>₹${c.price}</td>

</tr>

`;

});

html+="</table></div>";

content.innerHTML=html;

}



/* ORDERS */

async function loadOrders(){

const cart=await fetch(

"https://backend-style-mart.vercel.app/cart/"+email

).then(r=>r.json());

let html="<div class='card'><h2>My Orders</h2>";

html+="<table>";

html+="<tr><th>Product</th><th>Price</th></tr>";

cart.forEach(c=>{

html+=`

<tr>

<td>${c.name}</td>

<td>₹${c.price}</td>

</tr>

`;

});

html+="</table></div>";

content.innerHTML=html;

}


/* LOGOUT */

function logout(){

localStorage.clear();

location="index.html";

}

</script>

</body>

</html>
