<!DOCTYPE html>
<html>
<head>
<title>StyleMart Admin Dashboard</title>

<style>

body{
margin:0;
font-family:Segoe UI;
display:flex;
background:#f4f6fb;
}

/* SIDEBAR */

.sidebar{

width:240px;
background:linear-gradient(180deg,#0f172a,#6366f1);
color:white;
height:100vh;
padding:20px;

/* ADD THIS */
display:flex;
flex-direction:column;

}

.menu{
padding:12px;
margin-bottom:10px;
border-radius:8px;
cursor:pointer;
background:rgba(255,255,255,0.1);
}

.menu:hover{
background:rgba(255,255,255,0.25);
}

/* MAIN */

.main{
flex:1;
padding:30px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.cards{
display:flex;
gap:20px;
margin-top:20px;
}

.card{
flex:1;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.section{
margin-top:25px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.deleteBtn{
background:rgb(247, 90, 17);
color:white;
}

.editBtn{
background:#2563eb;
color:white;
}

input,select{
padding:8px;
margin:5px;
}

/* BACKGROUND OVERLAY */

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:9999;
}

/* LOGIN BOX */

.admin-box{

background:#fff;
padding:35px;
width:420px;
border-radius:18px;
box-shadow:0 15px 40px rgba(0,0,0,.3);

}

/* TITLE */

.admin-box h2{

text-align:center;
color:#b6d4e0;
margin-bottom:25px;

}

/* LABEL */

.admin-box label{

display:block;
margin-top:10px;
font-weight:500;

}

/* INPUT */

.admin-box input{

width:100%;
padding:14px;
margin-top:8px;
border-radius:10px;
border:1px solid #ccc;

}

/* BUTTON */

.admin-box button{

width:100%;
margin-top:25px;
padding:15px;
background:#ef4444;
color:white;
border:none;
border-radius:30px;
font-size:16px;
cursor:pointer;

}

.admin-box button:hover{

background:#dc2626;

}

/* DARK MODE FULL UI */

body.dark{
background:#0f172a;
color:white;
}

.dark .section{
background:#1e293b;
color:white;
}

.dark .sidebar{
background:#020617;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>StyleMart</h2>

<div class="menu" onclick="loadDashboard()">Dashboard</div>
<div class="menu" onclick="loadProducts()">Products</div>
<div class="menu" onclick="loadOrders()">Orders</div>
<div class="menu" onclick="loadUsers()">Users</div>

<!-- PUSH BOTTOM -->
<div style="margin-top:auto;">

<div class="menu" onclick="openSettings()">
⚙ Settings
</div>


</div>

</div>

<div class="main">

<div class="header">
<h1>Admin Dashboard</h1>

<div style="position:relative;">

<button onclick="toggleAdminMenu()" 
style="padding:8px 15px; border:none; background:#111; color:white; border-radius:20px; cursor:pointer;">

 <a onclick="openAdminLogin()">👤 Admin ▼</a>
</button>

<div id="adminDropdown" 
style="display:none; position:absolute; right:0; top:40px; background:white; box-shadow:0 5px 15px rgba(0,0,0,.2); border-radius:8px; overflow:hidden;">

<div onclick="logout()" 
style="padding:10px; cursor:pointer; color:red;">
Logout
</div>

</div>

</div>

</div>

<div class="cards">

<div class="card">
<h3>Total Orders</h3>
<h2 id="totalOrders">0</h2>
</div>

<div class="card">
<h3>Total Users</h3>
<h2 id="totalUsers">0</h2>
</div>

<div class="card">
<h3>Total Revenue</h3>
<h2 id="totalRevenue">₹0</h2>
</div>

</div>

<div id="content"></div>

</div>


<!-- ADMIN LOGIN MODAL -->

<div id="adminLoginModal" class="modal">

  <div class="admin-box">

    <h2>Admin Login</h2>

    <label>Admin Email</label>
    <input type="email" id="adminEmail" placeholder="Enter admin email">

    <label>Admin Password</label>
    <input type="password" id="adminPassword" placeholder="Enter password">

    <button onclick="adminLogin()">
      Login as Admin
    </button>

  </div>

</div>



<script>

let editProductId=null;

/* SECURITY */

window.onload=()=>{

if(localStorage.getItem("role")!=="admin"){
alert("Access Denied");
window.location="index.html";
return;
}

loadDashboard();

}

/* DASHBOARD */

async function loadDashboard(){

const users=await fetch("http://localhost:5000/admin/users").then(r=>r.json());
const orders=await fetch("http://localhost:5000/admin/orders").then(r=>r.json());

document.getElementById("totalUsers").innerText=users.length;
document.getElementById("totalOrders").innerText=orders.length;

let revenue=0;

orders.forEach(o=>{
o.items?.forEach(i=>{
revenue+=i.price*i.qty;
});
});

document.getElementById("totalRevenue").innerText="₹ "+revenue;

document.getElementById("content").innerHTML="";

}

/* USERS */

async function loadUsers(){

const users=await fetch("http://localhost:5000/admin/users").then(r=>r.json());

let html=`<div class="section">
<h2>Users</h2>
<table>
<tr>
<th>Email</th>
<th>Role</th>
<th>Action</th>
</tr>`;

users.forEach(u=>{

html+=`
<tr>
<td>${u.email}</td>
<td>${u.role}</td>
<td>
${localStorage.getItem("updatePanel")==="true" ? `
<button class="deleteBtn" onclick="deleteUser('${u._id}')">Delete</button>
` : ""}
</td>
</tr>
`;

});

html+=`</table></div>`;

content.innerHTML=html;

}

/* DELETE USER */

async function deleteUser(id){

await fetch("http://localhost:5000/admin/user/"+id,{method:"DELETE"});

loadUsers();
loadDashboard();

}

/* PRODUCTS */

async function loadProducts(){

const products = await fetch(
"http://localhost:5000/admin/products"
).then(r=>r.json());

let html = `
<div class="section">

<h2>Products</h2>

<input id="pname" placeholder="Product Name">
<input id="pprice" placeholder="Price">
<input type="file" id="pimage">

<select id="pcategory">
<option value="shoes">Shoes</option>
<option value="tshirts">T-Shirts</option>
</select>

<button onclick="saveProduct()">Save Product</button>

<table>
<tr>
<th>Image</th>
<th>Name</th>
<th>Price</th>
<th>Action</th>
</tr>
`;

products.forEach(p=>{

html += `
<tr>

<td>
<img src="http://localhost:5000/uploads/${p.image}" width="50">
</td>

<td>${p.name}</td>

<td>₹ ${p.price}</td>

<td>

<button class="editBtn"
onclick="editProduct('${p._id}','${p.name}','${p.price}')">
Edit
</button>

<button class="deleteBtn"
onclick="deleteProduct('${p._id}')">
Delete
</button>

</td>

</tr>
`;

});

html += `</table></div>`;

document.getElementById("content").innerHTML = html;

}

/* SAVE PRODUCT (ADD / EDIT) */

async function saveProduct(){

const name = document.getElementById("pname").value.trim();
const price = document.getElementById("pprice").value.trim();
const category = document.getElementById("pcategory").value;
const imageFile = document.getElementById("pimage").files[0];

if(!name || !price){
alert("Enter product name and price");
return;
}

const formData = new FormData();

formData.append("name", name);
formData.append("price", price);
formData.append("category", category);

if(imageFile){
formData.append("image", imageFile);
}

await fetch("http://localhost:5000/admin/product",{
method:"POST",
body:formData
});

alert("Product added");

loadProducts();

}

/* EDIT PRODUCT */

function editProduct(id,name,price){

editProductId=id;

pname.value=name;
pprice.value=price;

}

/* DELETE PRODUCT */

async function deleteProduct(id){

await fetch("http://localhost:5000/admin/product/"+id,{
method:"DELETE"
});

loadProducts();

}

/* ORDERS */


async function loadOrders(){

const orders=await fetch(
"http://localhost:5000/admin/orders"
).then(r=>r.json());

let html=`
<div class="section">

<h2>Orders</h2>

<table>

<tr>
<th>User</th>
<th>Product</th>
<th>Price</th>
<th>Status</th>
<th>Action</th>
</tr>
`;

orders.forEach(o=>{

o.items?.forEach(i=>{

html+=`
<tr>

<td>${o.email}</td>

<td>${i.name}</td>

<td>₹ ${i.price}</td>

<td>${o.status}</td>

<td>

<button 
style="background:green;color:white"
onclick="updateOrder('${o._id}','Confirmed')">
Confirm
</button>

<button 
style="background:red;color:white"
onclick="updateOrder('${o._id}','Cancelled')">
Cancel
</button>

</td>

</tr>
`;

});

});

html+=`</table></div>`;

content.innerHTML=html;

}

/* ORDERS UPDATE */

async function updateOrder(id,status){

await fetch(
"http://localhost:5000/admin/order/"+id,
{
method:"PUT",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
status:status
})
});

loadOrders();

}
/* LOGOUT */

function logout(){

localStorage.removeItem("role");

window.location="index.html";

}

/* ADMIN DROPDOWN */

function toggleAdminMenu(){

const menu=document.getElementById("adminDropdown");

menu.style.display=
menu.style.display==="block"?"none":"block";

}

/* CLOSE DROPDOWN OUTSIDE CLICK */

window.onclick=function(e){

if(!e.target.innerText.includes("Admin")){

const menu=document.getElementById("adminDropdown");

if(menu) menu.style.display="none";

}

}

/* OPEN LOGIN */

function openAdminLogin(){

document.getElementById("adminLoginModal").style.display="flex";

}

/* CLOSE ON OUTSIDE CLICK */

window.onclick = function(e){

const modal=document.getElementById("adminLoginModal");

if(e.target===modal){

modal.style.display="none";

}

}

/* ADMIN LOGIN */

async function adminLogin(){

const email=document.getElementById("adminEmail").value;
const password=document.getElementById("adminPassword").value;

if(!email || !password){

alert("Fill all fields");

return;

}

const res = await fetch("http://localhost:5000/login",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({email,password})

});

const data = await res.json();

if(data.role==="admin"){

localStorage.setItem("role","admin");

alert("Login Successful ✅");

/* REDIRECT TO DASHBOARD */

window.location.href="admin.html";

}

else{

alert("Invalid Admin");

}

}

function openSettings(){

const isDark = localStorage.getItem("darkMode") === "true";
const isUpdate = localStorage.getItem("updatePanel") === "true";

document.getElementById("content").innerHTML = `

<div style="
margin-top:50px;
margin-left:40px;
">

<div style="
width:420px;
background:#ffffff;
padding:30px;
border-radius:14px;
box-shadow:0 8px 25px rgba(0,0,0,.15);
">

<h2 style="margin-bottom:25px;">⚙ Admin Settings</h2>

<!-- LANGUAGE -->
<div style="margin-bottom:20px;">
<label style="font-weight:600;">Language</label><br>
<select style="
width:100%;
padding:10px;
margin-top:8px;
border-radius:6px;
border:1px solid #ccc;
">
<option>English</option>
<option>Hindi</option>
</select>
</div>

<!-- DARK MODE -->
<div style="
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
">
<span style="font-weight:600;">Dark Mode</span>

<label class="switch">
<input type="checkbox" id="darkToggle" ${isDark ? "checked" : ""}>
<span class="slider"></span>
</label>
</div>

<!-- UPDATE PANEL -->
<div style="
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
">
<span style="font-weight:600;">Update Panel</span>

<label class="switch">
<input type="checkbox" id="updateToggle" ${isUpdate ? "checked" : ""}>
<span class="slider"></span>
</label>
</div>

<button onclick="saveSettings()" 
style="
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
">
Save Settings
</button>

</div>

</div>

`;

}


function saveSettings(){

const dark = document.getElementById("darkToggle").checked;
const update = document.getElementById("updateToggle").checked;
const language = document.getElementById("language").value;

/* SAVE */
localStorage.setItem("darkMode", dark);
localStorage.setItem("updatePanel", update);
localStorage.setItem("language", language);

/* APPLY DARK MODE */
if(dark){
document.body.classList.add("dark");
}else{
document.body.classList.remove("dark");
}

alert("Settings Saved ✅");

}

function switchUser(){

localStorage.clear();

alert("Switched User");

window.location.href = "index.html";

}


window.onload=()=>{

if(localStorage.getItem("role")!=="admin"){
alert("Access Denied");
window.location="index.html";
return;
}

/* APPLY DARK MODE */
if(localStorage.getItem("darkMode")==="true"){
document.body.classList.add("dark");
}

loadDashboard();

}


</script>

</body>
</html>
